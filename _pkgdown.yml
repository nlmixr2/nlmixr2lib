# The navbar dropdowns under `specific_drugs` and `ddmore` plus the
# top-level `articles:` index are auto-generated by
# `nlmixr2lib:::.writePkgdownNavbar()` during `devtools::document()`.
# The function rewrites only the lines between `# AUTOGEN:<name>:BEGIN`
# and `# AUTOGEN:<name>:END` markers; everything else is preserved
# byte-for-byte. Edit anything outside the signposts freely; edits
# inside will be overwritten on the next regen.

